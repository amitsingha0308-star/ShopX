<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ShopX Payment Test</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;padding-bottom:72px;color:#111}header{position:sticky;top:0;z-index:10;background:#131921;color:#fff;display:flex;gap:10px;align-items:center;padding:12px 14px}header .brand{font-weight:700;font-size:20px;white-space:nowrap}header input{flex:1;min-width:0;padding:10px;border:0;border-radius:6px;outline:none}header button{padding:10px 12px;border:0;border-radius:6px;background:#febd69;font-weight:700}.tabs{display:flex;gap:0;overflow:auto;position:fixed;left:0;right:0;bottom:0;background:#131921;border-top:1px solid rgba(255,255,255,.12);z-index:20}.tabs button{flex:1;min-width:88px;padding:10px 6px;background:none;border:0;color:#fff;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px}.tabs button.active{background:#1d2630;color:#ff9900}.tabs .ico{font-size:18px}.section{display:none;max-width:1200px;margin:0 auto;padding:16px}.section.active{display:block}.hero{background:linear-gradient(90deg,#e3f2fd,#bbdefb);border-radius:14px;padding:22px;text-align:center;margin-bottom:16px}.hero h1{margin:0 0 6px;color:#0f3b63}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.card,.panel{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:12px}.img{height:160px;border-radius:10px;overflow:hidden;background:#e8e8e8;margin-bottom:10px}.img img{width:100%;height:100%;object-fit:cover;display:block}.title{font-weight:700;margin-bottom:4px}.price{color:#b12704;font-weight:700;margin-bottom:8px}.btn{width:100%;padding:10px;border:0;border-radius:8px;background:#ff9900;color:#fff;font-weight:700}.btn.secondary{background:#eceff1;color:#111}.row{display:flex;gap:10px;flex-wrap:wrap}.pill{border:1px solid #ddd;background:#fff;border-radius:999px;padding:8px 12px}.pill.active{background:#131921;color:#fff;border-color:#131921}.cartItem,.invItem{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #eee}.small{padding:8px 10px;border:0;border-radius:8px;font-weight:700}.muted{color:#666;font-size:13px}.hidden{display:none}.payBox{display:grid;gap:10px}.payChoice{display:flex;gap:8px;flex-wrap:wrap}.payChoice button{border:1px solid #ddd;background:#fff;border-radius:999px;padding:8px 12px;font-weight:700}.payChoice button.active{background:#131921;color:#fff;border-color:#131921}.status{margin-top:10px;font-weight:700}.ok{color:#0a7a28}.err{color:#b00020}
</style>
</head>
<body>
<header><div class="brand">ShopX</div><input id="search" placeholder="Search products" /><button id="searchBtn">Search</button></header>
<div id="msg" style="max-width:1200px;margin:10px auto 0;padding:0 16px;font-weight:700;color:#0a7a28"></div>
<section id="home" class="section active"><div class="hero"><h1>ShopX Amazon Clone</h1><div>Browse, add to cart, and pay</div></div><div class="panel" style="margin-bottom:14px"><div class="row" id="cats"><button class="pill active" data-cat="all">All</button><button class="pill" data-cat="phones">Phones</button><button class="pill" data-cat="laptops">Laptops</button><button class="pill" data-cat="audio">Audio</button><button class="pill" data-cat="gaming">Gaming</button><button class="pill" data-cat="tv">TV</button></div></div><div id="products" class="grid"></div></section>
<section id="cart" class="section"><div class="panel"><h2>Cart</h2><div id="cartList"></div><div style="margin-top:12px;font-weight:700">Total: ₹<span id="cartTotal">0</span></div><div class="row" style="margin-top:10px"><button class="small" id="clearCart" style="background:#eceff1">Clear Cart</button></div></div></section>
<section id="payment" class="section"><div class="panel"><h2>Payment</h2><div class="muted">Test the payment flow here. It works with Cart items.</div><div class="payChoice" style="margin:12px 0"><button class="active" data-pay="UPI">UPI</button><button data-pay="Card">Card</button><button data-pay="COD">COD</button></div><div id="payForm" class="payBox"></div><div class="row" style="margin-top:12px"><button class="small" id="payNow" style="background:#ff9900;color:#fff">Pay Now</button><button class="small" id="fillDemo" style="background:#eceff1">Demo Cart</button></div><div id="payStatus" class="status"></div></div></section>
<section id="wishlist" class="section"><div class="panel"><h2>Wishlist</h2><div id="wishList" class="muted">No wishlist items.</div></div></section>
<section id="inventory" class="section"><div class="panel"><h2>Inventory Management</h2><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin:12px 0"><input id="invName" placeholder="Product name" style="padding:10px;border:1px solid #ddd;border-radius:8px"><input id="invPrice" placeholder="Price" type="number" style="padding:10px;border:1px solid #ddd;border-radius:8px"><input id="invCat" placeholder="Category" style="padding:10px;border:1px solid #ddd;border-radius:8px"><input id="invImg" placeholder="Image URL (optional)" style="padding:10px;border:1px solid #ddd;border-radius:8px"></div><div class="row" style="margin-bottom:12px"><button class="small" id="addInv" style="background:#ff9900;color:#fff">Add Item</button><button class="small" id="loadSample" style="background:#eceff1">Load Sample</button></div><div id="invList"></div></div></section>
<div class="tabs"><button class="active" data-tab="home"><span class="ico">⌂</span><span>Home</span></button><button data-tab="cart"><span class="ico">🛒</span><span>Cart</span></button><button data-tab="payment"><span class="ico">💳</span><span>Pay</span></button><button data-tab="wishlist"><span class="ico">♡</span><span>Wish</span></button><button data-tab="inventory"><span class="ico">📋</span><span>Inv</span></button></div>
<script>
const data=[{name:'Smartphone X',price:19999,cat:'phones',img:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=900&q=80'},{name:'Laptop Pro',price:54999,cat:'laptops',img:'https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=900&q=80'},{name:'Wireless Earbuds',price:6499,cat:'audio',img:'https://images.unsplash.com/photo-1590658165737-15a047b4b1f5?auto=format&fit=crop&w=900&q=80'},{name:'PlayStation 5',price:54999,cat:'gaming',img:'https://images.unsplash.com/photo-1606813902871-1c9d6e4f7f2b?auto=format&fit=crop&w=900&q=80'},{name:'Smart TV 55 inch',price:42999,cat:'tv',img:'https://images.unsplash.com/photo-1593784991095-a205069470b6?auto=format&fit=crop&w=900&q=80'}];
let inventory=[],cart=[],wishlist=[],activeCat='all',payMethod='UPI';
const $=id=>document.getElementById(id), tabs=[...document.querySelectorAll('.tabs button')], sections=[...document.querySelectorAll('.section')], msg=$('msg');
function toast(t,c='#0a7a28'){msg.style.color=c;msg.textContent=t;setTimeout(()=>msg.textContent='',1800)}
function show(tab){sections.forEach(s=>s.classList.toggle('active',s.id===tab)); tabs.forEach(b=>b.classList.toggle('active',b.dataset.tab===tab))}
function allProducts(){return [...data,...inventory]}
function imgUrl(u,name){return /^https?:///i.test(u||'')?u:'https://via.placeholder.com/600x400?text='+encodeURIComponent(name)}
function renderProducts(){const q=$('search').value.trim().toLowerCase(); const list=allProducts().filter(x=>(activeCat==='all'||x.cat===activeCat)&&(!q||x.name.toLowerCase().includes(q)||x.cat.toLowerCase().includes(q))); $('products').innerHTML=list.map(x=>`<div class="card"><div class="img"><img src="${imgUrl(x.img,x.name)}" alt="${x.name}"></div><div class="title">${x.name}</div><div class="price">₹${Number(x.price).toLocaleString('en-IN')}</div><div class="muted">${x.cat}</div><div style="margin-top:10px;display:grid;gap:8px"><button class="btn" data-add="${x.name}">Add to Cart</button><button class="btn secondary" data-wish="${x.name}">Wishlist</button></div></div>`).join('')||'<div class="panel">No products found.</div>'; document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToCart(b.dataset.add)); document.querySelectorAll('[data-wish]').forEach(b=>b.onclick=()=>addWish(b.dataset.wish))}
function addToCart(name){const p=allProducts().find(x=>x.name===name); const f=cart.find(x=>x.name===name); if(f)f.qty++; else cart.push({...p,qty:1}); renderCart(); toast('Added to cart')}
function renderCart(){const list=$('cartList'); list.innerHTML=cart.map((x,i)=>`<div class="cartItem"><div><b>${x.name}</b><div class="muted">₹${Number(x.price).toLocaleString('en-IN')} × ${x.qty}</div></div><div class="row"><button class="small" data-dec="${i}">-</button><button class="small" data-inc="${i}">+</button><button class="small" data-del="${i}" style="background:#ffe0e0">x</button></div></div>`).join('')||'<div class="muted">Cart is empty.</div>'; $('cartTotal').textContent=cart.reduce((s,x)=>s+x.price*x.qty,0).toLocaleString('en-IN'); list.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>{cart[b.dataset.inc].qty++; renderCart()}); list.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>{const i=b.dataset.dec; cart[i].qty--; if(cart[i].qty<=0)cart.splice(i,1); renderCart()}); list.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{cart.splice(b.dataset.del,1); renderCart()})}
function addWish(name){if(!wishlist.includes(name)) wishlist.push(name); $('wishList').innerHTML=wishlist.map(x=>`<div class="cartItem"><div>${x}</div></div>`).join('')||'No wishlist items.'; toast('Added to wishlist')}
function renderInv(){const list=$('invList'); list.innerHTML=inventory.map((x,i)=>`<div class="invItem"><div><b>${x.name}</b><div class="muted">₹${Number(x.price).toLocaleString('en-IN')} · ${x.cat}</div></div><button class="small" data-rem="${i}" style="background:#ffe0e0">Remove</button></div>`).join('')||'<div class="muted">No inventory items yet.</div>'; list.querySelectorAll('[data-rem]').forEach(b=>b.onclick=()=>{inventory.splice(b.dataset.rem,1); renderInv(); renderProducts(); toast('Removed from inventory')})}
function addInventory(){const name=$('invName').value.trim(), price=Number($('invPrice').value), cat=$('invCat').value.trim().toLowerCase()||'misc', img=$('invImg').value.trim(); if(!name||!price){toast('Fill name and price','#b00020');return} inventory.push({name,price,cat,img}); $('invName').value=''; $('invPrice').value=''; $('invCat').value=''; $('invImg').value=''; renderInv(); renderProducts(); toast('Inventory added')}
function loadSample(){inventory=[{name:'PS5 Console',price:54999,cat:'gaming',img:'https://images.unsplash.com/photo-1606813902871-1c9d6e4f7f2b?auto=format&fit=crop&w=900&q=80'},{name:'Bluetooth Speakers',price:2599,cat:'audio',img:'https://images.unsplash.com/photo-1589003077984-894e133dabab?auto=format&fit=crop&w=900&q=80'}]; renderInv(); renderProducts(); toast('Sample loaded')}
function renderPay(){const form=$('payForm'); form.innerHTML=payMethod==='UPI'?'<input id="upiId" placeholder="UPI ID" style="padding:10px;border:1px solid #ddd;border-radius:8px">':payMethod==='Card'?'<div class="grid" style="grid-template-columns:1fr 1fr"><input id="cardNo" placeholder="Card Number" style="padding:10px;border:1px solid #ddd;border-radius:8px"><input id="cardName" placeholder="Name on Card" style="padding:10px;border:1px solid #ddd;border-radius:8px"><input id="cardExp" placeholder="Expiry" style="padding:10px;border:1px solid #ddd;border-radius:8px"><input id="cardCvv" placeholder="CVV" style="padding:10px;border:1px solid #ddd;border-radius:8px"></div>':'<div class="muted">Cash on Delivery selected.</div>'}
function pay(){if(!cart.length){$('payStatus').textContent='Cart is empty';$('payStatus').className='status err';return} if(payMethod==='UPI'&&!$('upiId').value.trim()){$('payStatus').textContent='Enter UPI ID';$('payStatus').className='status err';return} if(payMethod==='Card'&&(!$('cardNo').value.trim()||!$('cardName').value.trim()||!$('cardExp').value.trim()||!$('cardCvv').value.trim())){$('payStatus').textContent='Fill card details';$('payStatus').className='status err';return} const total=cart.reduce((s,x)=>s+x.price*x.qty,0); cart=[]; renderCart(); $('payStatus').textContent='Payment successful. Order placed for ₹'+total.toLocaleString('en-IN')+' via '+payMethod; $('payStatus').className='status ok'; toast('Payment done')}
$('searchBtn').onclick=renderProducts; $('search').addEventListener('keydown',e=>{if(e.key==='Enter')renderProducts()}); $('clearCart').onclick=()=>{cart=[]; renderCart(); toast('Cart cleared')}; tabs.forEach(b=>b.onclick=()=>show(b.dataset.tab)); document.querySelectorAll('#cats .pill').forEach(b=>b.onclick=()=>{document.querySelectorAll('#cats .pill').forEach(x=>x.classList.remove('active')); b.classList.add('active'); activeCat=b.dataset.cat; renderProducts()}); $('addInv').onclick=addInventory; $('loadSample').onclick=loadSample; $('payNow').onclick=pay; $('fillDemo').onclick=()=>{cart=[{name:'Demo Phone',price:9999,cat:'phones',img:'',qty:1},{name:'Demo Earbuds',price:1499,cat:'audio',img:'',qty:1}]; renderCart(); toast('Demo cart loaded')}; document.querySelectorAll('.payChoice button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.payChoice button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); payMethod=b.dataset.pay; renderPay()}); loadSample(); renderProducts(); renderCart(); renderInv(); renderPay(); $('wishList').innerHTML='No wishlist items.';
</script>
</body>
</html>
